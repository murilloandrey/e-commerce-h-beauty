name: Deploy to GitHub Pages

on:
  push:
    branches: [develop]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: h-beauty-supply-code
        run: npm install

      - name: Build
        working-directory: h-beauty-supply-code
        env:
          VITE_SHOPIFY_STORE_DOMAIN: h-beauty-supply-2.myshopify.com
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: h-beauty-supply-code/dist
